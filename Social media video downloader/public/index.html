<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storage-less Social Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/config.js"></script>
  </head>
  <body class="min-h-screen bg-zinc-950 text-zinc-100">
    <main class="flex min-h-screen items-center justify-center px-4 py-10">
      <section class="w-full max-w-4xl">
        <div class="mb-8 text-center">
          <p class="mb-3 text-sm font-semibold uppercase tracking-[0.2em] text-emerald-300">Real-time proxy streaming</p>
          <h1 class="text-4xl font-bold tracking-normal text-white sm:text-5xl">Social Video Downloader</h1>
          <p class="mx-auto mt-4 max-w-2xl text-base leading-7 text-zinc-400">
            Extract a playable CDN source and stream it through the backend without saving video files.
          </p>
        </div>

        <form id="extractForm" class="rounded-lg border border-zinc-800 bg-zinc-900/80 p-4 shadow-2xl shadow-black/30 sm:p-6">
          <div class="flex flex-col gap-3 sm:flex-row">
            <label for="urlInput" class="sr-only">Social media URL</label>
            <input
              id="urlInput"
              name="url"
              type="url"
              required
              placeholder="Paste a YouTube, Instagram, TikTok, or X URL"
              class="min-h-14 flex-1 rounded-md border border-zinc-700 bg-zinc-950 px-4 text-base text-white outline-none transition placeholder:text-zinc-500 focus:border-emerald-400 focus:ring-4 focus:ring-emerald-400/10"
            />
            <button
              id="extractButton"
              type="submit"
              class="inline-flex min-h-14 items-center justify-center gap-3 rounded-md bg-emerald-400 px-6 text-base font-bold text-zinc-950 transition hover:bg-emerald-300 disabled:cursor-not-allowed disabled:bg-zinc-700 disabled:text-zinc-400"
            >
              <span id="buttonText">Extract</span>
              <span id="spinner" class="hidden h-5 w-5 animate-spin rounded-full border-2 border-zinc-950/30 border-t-zinc-950"></span>
            </button>
          </div>
        </form>

        <div id="errorBox" class="mt-5 hidden rounded-md border border-red-500/40 bg-red-500/10 px-4 py-3 text-sm leading-6 text-red-100"></div>

        <section id="result" class="mt-6 hidden overflow-hidden rounded-lg border border-zinc-800 bg-zinc-900 shadow-2xl shadow-black/30">
          <div class="grid gap-0 md:grid-cols-[280px_1fr]">
            <img id="thumbnail" alt="" class="h-full min-h-56 w-full bg-zinc-950 object-cover" />

            <div class="flex min-w-0 flex-col justify-between gap-5 p-5 sm:p-6">
              <div>
                <p class="mb-2 text-xs font-semibold uppercase tracking-[0.2em] text-indigo-300">Ready</p>
                <h2 id="videoTitle" class="break-words text-2xl font-bold leading-tight text-white"></h2>
              </div>

              <a
                id="downloadButton"
                href="#"
                class="inline-flex min-h-12 w-full items-center justify-center rounded-md bg-indigo-400 px-5 text-center text-base font-bold text-zinc-950 transition hover:bg-indigo-300 sm:w-auto"
              >
                Download Video
              </a>
            </div>
          </div>

          <div class="border-t border-zinc-800 bg-black">
            <video id="videoPlayer" class="aspect-video w-full bg-black" controls playsinline preload="metadata"></video>
          </div>
        </section>
      </section>
    </main>

    <script>
      const appConfig = window.APP_CONFIG || {};
      const apiBaseUrl = (appConfig.API_BASE_URL || "").replace(/\/+$/, "");
      const form = document.getElementById("extractForm");
      const urlInput = document.getElementById("urlInput");
      const button = document.getElementById("extractButton");
      const buttonText = document.getElementById("buttonText");
      const spinner = document.getElementById("spinner");
      const errorBox = document.getElementById("errorBox");
      const result = document.getElementById("result");
      const thumbnail = document.getElementById("thumbnail");
      const videoTitle = document.getElementById("videoTitle");
      const videoPlayer = document.getElementById("videoPlayer");
      const downloadButton = document.getElementById("downloadButton");

      function apiUrl(pathOrUrl) {
        if (!pathOrUrl) {
          return "";
        }

        if (/^https?:\/\//i.test(pathOrUrl)) {
          return pathOrUrl;
        }

        return new URL(pathOrUrl, apiBaseUrl || window.location.origin).toString();
      }

      async function readJson(response) {
        const contentType = response.headers.get("content-type") || "";

        if (!contentType.toLowerCase().includes("application/json")) {
          const body = await response.text();
          const preview = body.trim().slice(0, 80);
          const suffix = preview ? ` Response started with: ${preview}` : "";

          throw new Error(
            `The API returned HTML instead of JSON. On Netlify, deploy the FastAPI backend separately and set API_BASE_URL to that backend URL.${suffix}`,
          );
        }

        return response.json();
      }

      function setLoading(isLoading) {
        button.disabled = isLoading;
        spinner.classList.toggle("hidden", !isLoading);
        buttonText.textContent = isLoading ? "Extracting" : "Extract";
      }

      function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.remove("hidden");
      }

      function clearState() {
        errorBox.classList.add("hidden");
        errorBox.textContent = "";
        result.classList.add("hidden");
        videoPlayer.removeAttribute("src");
        videoPlayer.load();
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearState();
        setLoading(true);

        try {
          const response = await fetch(apiUrl("/extract"), {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ url: urlInput.value.trim() }),
          });

          const data = await readJson(response);

          if (!response.ok) {
            throw new Error(data.detail || "Unable to extract this video.");
          }

          videoTitle.textContent = data.title || "Untitled video";

          if (data.thumbnail) {
            thumbnail.src = data.thumbnail;
            thumbnail.classList.remove("hidden");
          } else {
            thumbnail.removeAttribute("src");
            thumbnail.classList.add("hidden");
          }

          videoPlayer.src = apiUrl(data.stream_url);
          downloadButton.href = apiUrl(data.download_url);
          downloadButton.setAttribute("download", "");
          result.classList.remove("hidden");
          videoPlayer.load();
        } catch (error) {
          showError(error.message || "Something went wrong.");
        } finally {
          setLoading(false);
        }
      });
    </script>
  </body>
</html>
